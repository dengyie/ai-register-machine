name: Deploy console10

# Manual-only. Does NOT stop batch/coinbot.
# Required secrets (Settings → Secrets and variables → Actions):
#   PXED_SSH_PRIVATE_KEY  — deploy key private PEM
#   PXED_HOST             — ssh target (prefer direct host, e.g. user@pxed1497962.bohrium.tech)
#   PXED_KNOWN_HOSTS      — known_hosts lines for that host (REQUIRED for real deploy)
# Optional secrets:
#   PXED_SSH_PORT         — default 22
#   PXED_WEB              — remote web root (default /data/grok-register/apps/web)
#
# Protection: job uses Environment `pxed` (configure required reviewers / wait timer
# in Settings → Environments). Create the environment once before first deploy.

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref to build (branch/tag/sha). Empty = this workflow SHA."
        required: false
        default: ""
        type: string
      use_latest_artifact:
        description: "Deploy latest successful console10-web artifact from main CI (skip rebuild)."
        required: false
        default: false
        type: boolean
      remote_web:
        description: "Override remote web root under /data/grok-register (empty = secret/default)."
        required: false
        default: ""
        type: string
      dry_run:
        description: "Build/download only; do not scp/ssh (no secrets required)."
        required: false
        default: false
        type: boolean

concurrency:
  group: deploy-console10
  cancel-in-progress: false

jobs:
  deploy:
    name: deploy-to-pxed
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # C1: Environment gate — real deploys go through GitHub Environment protections.
    # dry_run also uses the env so the job is visible, but secrets are optional then.
    environment: pxed

    steps:
      - name: Resolve ref
        id: ref
        run: |
          set -euo pipefail
          REF="${{ inputs.ref }}"
          if [[ -z "$REF" ]]; then
            REF="${{ github.sha }}"
          fi
          echo "ref=$REF" >> "$GITHUB_OUTPUT"
          echo "Deploying ref=$REF dry_run=${{ inputs.dry_run }} use_artifact=${{ inputs.use_latest_artifact }}"

      - name: Checkout
        if: ${{ inputs.use_latest_artifact == false }}
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.ref.outputs.ref }}

      - name: Setup Node
        if: ${{ inputs.use_latest_artifact == false }}
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Build console10
        if: ${{ inputs.use_latest_artifact == false }}
        run: ./scripts/build_web_console.sh

      - name: Pack from build
        if: ${{ inputs.use_latest_artifact == false }}
        run: |
          set -euo pipefail
          mkdir -p /tmp/console10-ci
          tar -C apps/web/dist -czf /tmp/console10-ci/console10-webroot.tgz .
          ls -la /tmp/console10-ci/console10-webroot.tgz
          test -s /tmp/console10-ci/console10-webroot.tgz

      - name: Download latest console10 artifact from main CI
        if: ${{ inputs.use_latest_artifact == true }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          mkdir -p /tmp/console10-ci
          RUN_ID=$(gh run list \
            --repo "${{ github.repository }}" \
            --branch main \
            --workflow CI \
            --json databaseId,conclusion,status \
            --limit 30 \
            --jq '.[] | select(.conclusion=="success" and .status=="completed") | .databaseId' \
            | head -1)
          if [[ -z "${RUN_ID}" ]]; then
            echo "No successful CI run on main with artifacts" >&2
            exit 1
          fi
          echo "Using CI run $RUN_ID"
          gh run download "$RUN_ID" \
            --repo "${{ github.repository }}" \
            --name console10-web \
            --dir /tmp/console10-ci
          TGZ=$(find /tmp/console10-ci -name 'console10-webroot.tgz' | head -1)
          if [[ -z "$TGZ" ]]; then
            echo "console10-webroot.tgz missing in artifact" >&2
            find /tmp/console10-ci -maxdepth 4 -type f >&2 || true
            exit 1
          fi
          cp -f "$TGZ" /tmp/console10-ci/console10-webroot.tgz
          ls -la /tmp/console10-ci/console10-webroot.tgz

      - name: Sanitize remote web root
        id: web
        env:
          PXED_WEB_SECRET: ${{ secrets.PXED_WEB }}
          REMOTE_WEB_INPUT: ${{ inputs.remote_web }}
        run: |
          set -euo pipefail
          # C2: never interpolate untrusted path into remote shell.
          # Allow only absolute paths under /data/grok-register with safe charset.
          if [[ -n "${REMOTE_WEB_INPUT}" ]]; then
            CANDIDATE="$REMOTE_WEB_INPUT"
          elif [[ -n "${PXED_WEB_SECRET:-}" ]]; then
            CANDIDATE="$PXED_WEB_SECRET"
          else
            CANDIDATE="/data/grok-register/apps/web"
          fi
          # strip trailing slashes (keep root "/")
          while [[ "$CANDIDATE" == */ && "$CANDIDATE" != / ]]; do
            CANDIDATE="${CANDIDATE%/}"
          done
          case "$CANDIDATE" in
            /data/grok-register|/data/grok-register/*) ;;
            *)
              echo "remote_web must be under /data/grok-register, got: $CANDIDATE" >&2
              exit 1
              ;;
          esac
          if [[ "$CANDIDATE" == *..* ]]; then
            echo "remote_web must not contain .." >&2
            exit 1
          fi
          if [[ ! "$CANDIDATE" =~ ^/data/grok-register(/[A-Za-z0-9._+-]+)*$ ]]; then
            echo "remote_web has unsafe characters: $CANDIDATE" >&2
            exit 1
          fi
          echo "remote_web=$CANDIDATE" >> "$GITHUB_OUTPUT"
          echo "Using remote_web=$CANDIDATE"

      - name: Require deploy secrets
        if: ${{ inputs.dry_run == false }}
        env:
          PXED_SSH_PRIVATE_KEY: ${{ secrets.PXED_SSH_PRIVATE_KEY }}
          PXED_HOST: ${{ secrets.PXED_HOST }}
          PXED_KNOWN_HOSTS: ${{ secrets.PXED_KNOWN_HOSTS }}
        run: |
          set -euo pipefail
          missing=0
          for name in PXED_SSH_PRIVATE_KEY PXED_HOST PXED_KNOWN_HOSTS; do
            if [[ -z "${!name}" ]]; then
              echo "Missing required secret: $name" >&2
              missing=1
            fi
          done
          if [[ "$missing" -ne 0 ]]; then
            echo "Real deploy needs PXED_SSH_PRIVATE_KEY + PXED_HOST + PXED_KNOWN_HOSTS" >&2
            echo "Tip: use dry_run=true to build/download without secrets." >&2
            exit 1
          fi

      - name: Deploy to pxed
        if: ${{ inputs.dry_run == false }}
        env:
          PXED_SSH_PRIVATE_KEY: ${{ secrets.PXED_SSH_PRIVATE_KEY }}
          PXED_HOST: ${{ secrets.PXED_HOST }}
          PXED_SSH_PORT: ${{ secrets.PXED_SSH_PORT }}
          PXED_KNOWN_HOSTS: ${{ secrets.PXED_KNOWN_HOSTS }}
          PXED_WEB: ${{ steps.web.outputs.remote_web }}
        run: |
          set -euo pipefail
          PORT="${PXED_SSH_PORT:-22}"
          KEY_FILE="${RUNNER_TEMP}/pxed_deploy_key"
          umask 077
          # normalize PEM: ensure trailing newline
          printf '%s\n' "$PXED_SSH_PRIVATE_KEY" > "$KEY_FILE"
          chmod 600 "$KEY_FILE"
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          # C3: trust only explicit known_hosts — no keyscan, no accept-new
          printf '%s\n' "$PXED_KNOWN_HOSTS" > ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts
          SSH_BASE=(
            -i "$KEY_FILE"
            -o IdentitiesOnly=yes
            -o BatchMode=yes
            -o StrictHostKeyChecking=yes
            -o UserKnownHostsFile="$HOME/.ssh/known_hosts"
            -o GlobalKnownHostsFile=/dev/null
          )
          scp "${SSH_BASE[@]}" -P "$PORT" \
            /tmp/console10-ci/console10-webroot.tgz \
            "${PXED_HOST}:/tmp/console10-webroot.tgz"
          # remote path already sanitized in steps.web; pass as env to avoid shell injection
          # -T: no tty so local heredoc is the remote bash -s stdin
          ssh -T "${SSH_BASE[@]}" -p "$PORT" \
            "$PXED_HOST" \
            env "REMOTE=${PXED_WEB}" \
            bash -s <<'REMOTE_SCRIPT'
          set -euo pipefail
          case "$REMOTE" in
            /data/grok-register|/data/grok-register/*) ;;
            *) echo "refusing remote path: $REMOTE" >&2; exit 1 ;;
          esac
          mkdir -p "$REMOTE/assets" "$REMOTE/dist"
          tar -C "$REMOTE" -xzf /tmp/console10-webroot.tgz
          tar -C "$REMOTE/dist" -xzf /tmp/console10-webroot.tgz
          rm -f /tmp/console10-webroot.tgz
          echo '[deploy] web root index:'
          head -12 "$REMOTE/index.html"
          ls -la "$REMOTE/assets" | head
          REMOTE_SCRIPT
          echo "[deploy] SPA on ${PXED_HOST}:${PXED_WEB} — static only; batch/coinbot untouched"

      - name: Dry-run summary
        if: ${{ inputs.dry_run == true }}
        run: |
          set -euo pipefail
          ls -la /tmp/console10-ci/console10-webroot.tgz
          echo "remote_web=${{ steps.web.outputs.remote_web }}"
          echo "dry_run=1 — skipped scp/ssh (secrets not required)"
